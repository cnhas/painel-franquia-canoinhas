# Roda o scraper de pedidos nos horários combinados (horário de Brasília, UTC-3) e publica
# o dashboard atualizado no GitHub Pages — sem navegador, sem PC ligado, 100% na nuvem.
#
# Trocado de Netlify pro GitHub Pages em 20/07/2026: o Netlify mudou pra plano de créditos
# (free = ~20 publicações/mês) e essa automação publica dezenas de vezes por dia, muito
# além do grátis. GitHub Pages não cobra por publicação (só tem um limite informal de ~10
# por hora, bem acima da nossa frequência máxima de 1 a cada 15 min = 4/hora).

name: Atualizar painel franquia

permissions:
  contents: write  # necessário pra job conseguir dar git push de volta pro repositório
  pages: write      # necessário pra publicar no GitHub Pages
  id-token: write   # necessário pra actions/deploy-pages autenticar o deploy

# Evita duas publicações no GitHub Pages rodando ao mesmo tempo (esse workflow e o do Data
# Much podem disparar em horários próximos) — enfileira em vez de deixar correr em paralelo
# e corromper o deploy.
concurrency:
  group: "pages-deploy"
  cancel-in-progress: false

on:
  schedule:
    # 7h-9h (Brasília) a cada 1h -> 10h-11h UTC
    - cron: '0 10,11 * * *'
    # 9h-11h (Brasília) a cada 30 min -> 12h-13h59 UTC
    - cron: '0,30 12,13 * * *'
    # 11h-13h (Brasília) a cada 15 min, pico -> 14h-15h59 UTC
    - cron: '0,15,30,45 14,15 * * *'
    # 13h-18h (Brasília) a cada 15 min -> 16h-20h59 UTC
    - cron: '0,15,30,45 16,17,18,19,20 * * *'
    # 18h-22h (Brasília) a cada 15 min, pico -> 21h-23h59 UTC + 00h UTC (dia seguinte)
    - cron: '0,15,30,45 21,22,23,0 * * *'
    # 22h-00h (Brasília) a cada 30 min -> 01h-02h59 UTC (dia seguinte)
    - cron: '0,30 1,2 * * *'
    # 00h (Brasília, fechamento do dia) -> 03h UTC (dia seguinte)
    - cron: '0 3 * * *'
  workflow_dispatch: {}  # permite rodar manualmente pela aba Actions do GitHub

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache do navegador Playwright (Chromium)
        id: cache-playwright
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Instalar dependências Python
        run: pip install playwright

      - name: Instalar navegador + libs do sistema (Playwright)
        # --with-deps sempre roda (libs do sistema não dá pra cachear numa VM efêmera),
        # mas se o binário do Chromium já estiver no cache, pula o download dele.
        run: playwright install --with-deps chromium

      - name: Coletar pedidos e atualizar arquivos
        env:
          PAINEL_EMAIL: ${{ secrets.PAINEL_EMAIL }}
          PAINEL_SENHA: ${{ secrets.PAINEL_SENHA }}
        run: python automacao/scrape_pedidos.py

      - name: Preparar pasta de publicação
        run: |
          mkdir -p _site
          cp index.html _site/
          cp historico_vendas.json _site/ 2>/dev/null || true

      - name: Preparar artefato pro GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

      - name: Commitar mudanças de volta pro repositório
        run: |
          git config user.name "painel-bot"
          git config user.email "painel-bot@users.noreply.github.com"
          git add index.html historico_vendas.json
          git diff --cached --quiet || git commit -m "Atualiza pedidos ao vivo [automático]"
          git pull --rebase origin main
          git push
