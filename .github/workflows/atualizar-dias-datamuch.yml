# Coleta o detalhe diário completo (top lojas, cupons, ofertas De/Por) de um ou
# mais dias já fechados no Data Much, e atualiza a entrada correspondente no
# array "dias[]" do painel. Roda manualmente (workflow_dispatch) — usado tanto
# pra backfill de dias históricos quanto, futuramente, integrado à rotina
# diária normal (atualizar-datamuch.yml) pra cobrir o dia que acabou de fechar.
#
# Ainda em fase de testes (criado em 20/07/2026) — ver comentários no topo de
# automacao/scrape_dia_datamuch.py sobre o que foi validado manualmente vs. o
# que ainda pode precisar de ajuste de seletor numa primeira rodada real.

name: Atualizar dias (lojas/cupons/ofertas)

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages-deploy"
  cancel-in-progress: false

on:
  schedule:
      # Roda 1x/dia, depois que a atualização normal do Data Much (que roda em loop
          # até ~15h BRT) já teve chance de confirmar o dia fechado - 16h BRT = 19h UTC.
              - cron: '0 19 * * *'
  workflow_dispatch:
    inputs:
      dias:
        description: "Datas a coletar, YYYY-MM-DD separadas por vírgula (ex: 2026-07-16,2026-07-17)"
        required: true
        default: "2026-07-19"

jobs:
  atualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache do navegador Playwright (Chromium)
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-chromium-${{ runner.os }}

      - name: Instalar dependências Python
        run: pip install playwright

      - name: Instalar navegador + libs do sistema (Playwright)
        run: playwright install --with-deps chromium

      - name: Coletar detalhe dos dias
        id: coletar
        env:
          DATAMUCH_EMAIL: ${{ secrets.DATAMUCH_EMAIL }}
          DATAMUCH_SENHA: ${{ secrets.DATAMUCH_SENHA }}
          DIAS_ALVO: ${{ inputs.dias }}
        run: python automacao/scrape_dia_datamuch.py

      - name: Publicar screenshots de erro (se der falha)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: erro-debug-dias
          path: erro_dia_*.png
          if-no-files-found: ignore
          retention-days: 7

      - name: Commitar mudanças de volta pro repositório
        run: |
          git config user.name "dias-bot"
          git config user.email "dias-bot@users.noreply.github.com"
          git add index.html historico_vendas.json
          git diff --cached --quiet || git commit -m "Atualiza detalhe do(s) dia(s) [manual]: ${{ inputs.dias }}"
          git pull --rebase origin main
          git push

      - name: Preparar pasta de publicação
        run: |
          mkdir -p _site
          cp index.html _site/
          cp historico_vendas.json _site/ 2>/dev/null || true

      - name: Preparar artefato pro GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Publicar no GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
